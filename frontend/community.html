<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community | SportsFit</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="community">
    <div class="loader-overlay" id="globalLoader">
      <div class="spinner"></div>
    </div>
    <header class="topbar glass">
      <h1>Community</h1>
      <nav class="topbar-actions">
        <button class="btn-secondary" id="themeToggle">Toggle Theme</button>
        <a class="btn-secondary" href="dashboard.html">Dashboard</a>
        <a class="btn-secondary" href="nutrition.html">Nutrition AI</a>
        <a class="btn-secondary" href="workouts.html">Workout Tracker</a>
        <button class="btn-danger" id="logoutBtn">Logout</button>
      </nav>
    </header>

    <main class="container community-layout">
      <section class="community-column">
        <section class="card">
          <p class="community-kicker">Share With The Team</p>
          <h2>Post an update</h2>
          <p class="community-copy">Celebrate progress, ask for advice, or share what kept you motivated today.</p>
          <div id="communityPromptChips" class="community-chip-row"></div>
          <form id="postForm">
            <textarea id="postContent" placeholder="Share your latest fitness achievement..." required></textarea>
            <button class="btn-primary" type="submit">Post Update</button>
          </form>
        </section>

        <section class="card">
          <p class="community-kicker">This Week</p>
          <h2>Community challenges</h2>
          <div id="communityChallenges" class="community-stack"></div>
        </section>
      </section>

      <section class="community-column">
        <section class="card">
          <p class="community-kicker">Discover</p>
          <h2>Popular topics</h2>
          <div id="communityTopics" class="community-chip-row"></div>
        </section>

        <section class="card">
          <p class="community-kicker">Members</p>
          <h2>Community feed</h2>
          <div id="communityFeedMeta" class="community-feed-meta"></div>
          <div id="postsList" class="list"></div>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
