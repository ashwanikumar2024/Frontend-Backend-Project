<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Register | SportsFit</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="auth">
    <div class="loader-overlay" id="globalLoader">
      <div class="spinner"></div>
    </div>
    <header class="topbar glass">
      <h1>Welcome to SportsFit</h1>
      <div class="topbar-actions">
        <button class="btn-secondary" id="themeToggle">Toggle Theme</button>
        <a class="btn-secondary" href="../index.html">Home</a>
      </div>
    </header>

    <main class="container auth-grid">
      <section class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button class="btn-primary" type="submit">Login</button>
        </form>
      </section>

      <section class="card">
        <h2>Register</h2>
        <form id="registerForm">
          <input type="text" name="name" placeholder="Full Name" required />
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password (min 6 chars)" required />
          <select name="goal" required>
            <option value="weight_loss">Weight Loss</option>
            <option value="weight_gain">Weight Gain</option>
            <option value="maintain" selected>Maintain</option>
          </select>
          <select name="gender">
            <option value="male" selected>Male</option>
            <option value="female">Female</option>
          </select>
          <input type="number" name="age" placeholder="Age" min="10" max="100" />
          <input type="number" name="heightCm" placeholder="Height (cm)" min="100" max="250" />
          <input type="number" name="weightKg" placeholder="Weight (kg)" min="30" max="250" />
          <button class="btn-primary" type="submit">Register</button>
        </form>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
